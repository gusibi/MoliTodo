name: Build on Tag
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # 允许创建 Release 和上传文件

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Setup Python (macOS)
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: npm install
      - run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          PYTHON_PATH: /usr/bin/python3
          npm_config_python: /usr/bin/python3
      - name: List build artifacts
        run: ls -la dist/
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Setup Python (Windows)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1
      - name: Setup Visual Studio Build Tools
        run: |
          choco install visualstudio2022buildtools --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --includeRecommended --includeOptional --passive"
      - run: npm install
        env:
          PYTHON_PATH: ${{ env.pythonLocation }}\python.exe
          npm_config_python: ${{ env.pythonLocation }}\python.exe
      - run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHON_PATH: ${{ env.pythonLocation }}\python.exe
          npm_config_python: ${{ env.pythonLocation }}\python.exe
      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/*.exe

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: dist/
      - name: List all artifacts
        run: ls -la dist/
      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Generate release notes
        run: |
          cat > RELEASE_NOTES.md << 'EOF'
          # MoliTodo v${{ steps.get_version.outputs.VERSION }} ✨
          
          ## ⚠️ 重要升级提醒
          
          **升级前请务必备份数据！**
          
          1. **升级前备份**: 建议在升级前先导出您的任务数据
             - 打开应用 → 设置 → 数据管理 → 导出任务
             - 保存导出的文件到安全位置
          
          2. **升级后验证**: 升级完成后请检查应用是否正常工作
             - 确认任务数据完整
             - 测试基本功能（创建、编辑、删除任务）
          
          3. **问题恢复**: 如果升级后遇到问题
             - 使用之前导出的任务文件进行恢复
             - 设置 → 数据管理 → 导入任务
             - 或联系技术支持获取帮助: [GitHub Issues](https://github.com/${{ github.repository }}/issues)
          
          ---
          
          ## 🎉 v1.2.0 新功能亮点
          
          ### 🖥️ 桌面待办小部件 (Desktop Widget)
          - **桌面固定显示**: 全新桌面小部件，可固定在桌面上随时查看任务
          - **清单切换**: 小部件顶部支持切换不同清单，快速浏览不同分类的任务
          - **任务展开**: 点击任务可展开查看预设的具体步骤
          - **悬浮球集成**: 与悬浮球任务面板保持一致的使用体验
          
          ### 📋 批量任务操作 (Batch Operations)
          - **多选删除**: 支持多选已完成的任务进行批量删除
          - **复选框选择**: 已完成任务视图中添加复选框便于选择
          - **批量操作工具栏**: 选中任务后显示批量操作工具栏
          
          ### 🔄 悬浮球清单切换 (List Switching)
          - **清单选择器**: 悬浮球任务面板顶部新增清单切换功能
          - **快速导航**: 轻松切换收件箱、今天、进行中及自定义清单
          
          ### 🐛 问题修复
          - **日历选择器优化**: 修复日期选择器需要点击特定区域才能关闭的问题，现在点击日历外任意区域即可关闭
          
          ---
          
          ### 🍎 macOS 安装说明
          
          由于代码未签名，macOS 用户需要在安装后运行以下命令：
          
          ```bash
          sudo xattr -rd com.apple.quarantine /Applications/MoliTodo.app
          ```
          
          请在以下情况运行此命令：
          - 首次安装后
          - 每次更新后
          - 如果看到"无法打开应用程序"错误
          
          ### 📥 下载
          
          - **macOS**: 选择适合您 Mac 的版本（Intel/Apple Silicon）
          - **Windows**: Windows 10+ 通用安装程序
          
          ### 升级说明
          
          - 所有现有数据和设置都会保留
          - 新功能开箱即用，无需额外配置
          
          ---
          
          **完整文档**: [发布说明](https://github.com/${{ github.repository }}/blob/main/docs/releases/v${{ steps.get_version.outputs.VERSION }}.md)
          EOF
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
          body_path: RELEASE_NOTES.md
